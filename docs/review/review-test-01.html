<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>복습 테스트</title>
<style>
body{
  font-family: Arial, sans-serif;
  background:#0f172a;
  color:white;
  margin:0;
  padding:20px;
}
.container{
  max-width:800px;
  margin:auto;
}
.timer{
  text-align:right;
  font-weight:bold;
}
.question{
  margin-top:20px;
  font-size:18px;
  line-height:1.6;
}
.choices{
  margin-top:20px;
}
button{
  width:100%;
  padding:12px;
  margin:8px 0;
  background:#1e293b;
  color:white;
  border:1px solid #334155;
  cursor:pointer;
  border-radius:8px;
}
button:hover{
  background:#334155;
}
.feedback{
  margin-top:15px;
  font-weight:bold;
}
.hidden{
  display:none;
}
</style>
</head>
<body>
<div class="container">
<div class="timer">남은 시간: <span id="time">60</span>초</div>
<div id="quiz"></div>
<div id="feedback" class="feedback"></div>
</div>

<script>

const questions = [
{
type:"expression",
text:`G: What's wrong, Suho? You look worried.
B: My dog is sick. He won't eat or play.
G: Oh, I'm sorry to hear that.
B: What should I do? I'm so worried.`,
prompt:"밑줄 친 표현의 뜻은?",
underline:"I'm sorry to hear that",
choices:["그 말을 들으니 유감이야","정말 부럽다","어서 와","조심해","미안해"],
answer:0,
explain:"I'm sorry to hear that = 유감/위로 표현"
},

{
type:"vocab",
text:`G: What's wrong, Suho? You look worried.`,
prompt:"worried의 뜻은?",
underline:"worried",
choices:["걱정하는","행복한","배고픈","화난","지루한"],
answer:0,
explain:"worried = 걱정하는"
},

{
type:"spelling",
text:`B: You know what? My team won the soccer tournament.`,
prompt:"‘토너먼트’의 올바른 철자는?",
underline:null,
choices:["tournement","tournament","tornament","tourment","tournamint"],
answer:1,
explain:"정답: tournament"
},

{
type:"blank",
text:`G: Oh, I'm ____ to hear that.`,
prompt:"빈칸에 들어갈 말은?",
underline:"____",
choices:["happy","sorry","excited","angry","sure"],
answer:1,
explain:"I'm sorry to hear that"
}
];

let current=0;
let score=0;
let time=60;
let timer;

function startTimer(){
timer=setInterval(()=>{
time--;
document.getElementById("time").textContent=time;
if(time<=0){
clearInterval(timer);
nextQuestion();
}
},1000);
}

function render(){
if(current>=questions.length){
document.getElementById("quiz").innerHTML=`<h2>완료!</h2><p>점수: ${score}/${questions.length}</p>`;
return;
}

let q=questions[current];

let displayText=q.text;
if(q.underline){
displayText=displayText.replace(q.underline,`<u>${q.underline}</u>`);
}

let html=`<div class="question">${displayText}</div>
<div><b>${q.prompt}</b></div>
<div class="choices">`;

q.choices.forEach((c,i)=>{
html+=`<button onclick="checkAnswer(${i})">${i+1}. ${c}</button>`;
});

html+=`</div>`;

document.getElementById("quiz").innerHTML=html;
document.getElementById("feedback").textContent="";
}

function checkAnswer(i){
clearInterval(timer);
let q=questions[current];

if(i===q.answer){
score++;
document.getElementById("feedback").textContent="정답! " + q.explain;
}else{
document.getElementById("feedback").textContent="오답! " + q.explain;
}

setTimeout(nextQuestion,1000);
}

function nextQuestion(){
current++;
time=60;
document.getElementById("time").textContent=time;
render();
startTimer();
}

render();
startTimer();

</script>
</body>
</html>
